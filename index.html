<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermutec</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Header section -->
    <header>
        <div class="header-left">
            <img src="circular-pic.jpg" alt="Logo" class="logo-img">
            <div class="logo-text glow-text">Supermutec</div>
        </div>
        <div class="header-right">
            <nav>
                <ul>
                    <li><a href="#about" class="glow-text">About</a></li>
                    <li><a href="#services" class="glow-text">Services</a></li>
                    <li><a href="#contact" class="glow-text">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main content with glowing animated text -->
    <section class="hero">
        <h1 class="glow-text">Welcome to Supermutec</h1>
        <p class="glow-text">Your ultimate tech solution provider.</p>
    </section>

    <!-- Contact Info Section with glowing and animated text -->
    <section id="contact" class="contact-info">
        <h2 class="glow-text">Contact Us</h2>
        <p class="glow-text">Discord: supermutec</p>
        <p class="glow-text">Email: supermutec@gmail.com</p>
        <a href="https://discord.com" target="_blank" class="glow-button">Join My Discord Server</a>
    </section>

    <!-- Footer -->
    <footer>
        <p class="glow-text">&copy; 2024 Supermutec. All rights reserved.</p>
    </footer>
</body>
</html>
