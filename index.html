<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermutec</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
<header>
 <div class="logo">Supermutec</div>
 <nav>
  <ul>
   <li><a href="#about">About</a></li>
   <li><a href="#services">Services</a></li>
   <li><a href="#contact">Contact</a></li>
  </ul>
 </nav>
</header>
<section class="hero">
<h1>Welcome to Supermutec</h1>
<p>Your ultimate tech solution provider.</p>
<a href="#contact" class="cta-button">Get in Touch</a>
</section>
<section id="about">
<h2>About Us</h2>
<p>We specialize in modern tech solutions that elevate your business.</p>
</section>
<section id="services">
<h2>Our Services</h2>
<div class="service-card">Service 1</div>
<div class="service-card">Service 2</div>

</section>
<section id="contact">
<h2>Contact Us</h2>

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message" required></textarea>
<button type="submit">Send</button>
</form>
<div id="form-message"></div>
</section>
<footer>

</footer>
