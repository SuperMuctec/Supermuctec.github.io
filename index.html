<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermuctec</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Supermuctec</h1>
            <img src="your-image.jpg" alt="Logo" class="download.jpeg"> <!-- Replace with your actual image -->
        </div>
        <nav>
            <ul>
                <li><a href="#">Services</a></li>
                <li><a href="#" id="contactButton">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Supermuctec</h2>
        <a href="#" class="cta-button">Get In Touch</a>
    </section>

    <section class="service-enclosure">
        <div class="service-card">Multi-Purpose Discord Bot</div>
        <div class="service-card">Typing Animation Maker</div>
        <div class="service-card">Stock Market Predictor (Working)</div>
    </section>

    <footer>
        <p>&copy; 2024 Supermuctec. All Rights Reserved.</p>
    </footer>

    <div class="modal" id="contactModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Contact Us</h2>
            <p>Discord: <a href="https://discord.gg" target="_blank">supermutec</a></p>
            <p>Email: supermutec@gmail.com</p>
            <button id="discordButton">Join Discord</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
